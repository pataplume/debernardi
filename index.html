<style>
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --bg: #0B0F2A;
    --text: #F4EDDE;
    --text-dim: rgba(244, 237, 222, 0.4);
    --text-mid: rgba(244, 237, 222, 0.6);
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    background-color: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Page fade-in */
  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem 1.5rem;
    opacity: 0;
    animation: fadeIn 0.45s ease-out forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Dot */
  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background-color: var(--text);
    margin-bottom: 2.8rem;
    margin-left: 2.5%;
    animation: pulse 3.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.88; }
    50% { opacity: 1; }
  }

  /* Identity */
  .identity {
    text-align: center;
    margin-bottom: 3.2rem;
  }

  .name {
    font-size: clamp(1.65rem, 5.5vw, 2.6rem);
    font-weight: 400;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 0.55rem;
  }

  .atelier {
    font-size: clamp(0.95rem, 3vw, 1.15rem);
    font-weight: 300;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-mid);
    line-height: 1.3;
  }

  /* CTA Button */
  .cta {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.95rem 2.8rem;
    border: 1px solid rgba(244, 237, 222, 0.35);
    border-radius: 40px;
    background: transparent;
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(0.95rem, 2.5vw, 1.1rem);
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.3s ease, color 0.3s ease, background-color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 52px;
    margin-bottom: 2.8rem;
  }

  .cta:hover {
    border-color: rgba(244, 237, 222, 0.7);
    background-color: rgba(244, 237, 222, 0.06);
  }

  .cta:active {
    background-color: rgba(244, 237, 222, 0.1);
  }

  /* Secondary links */
  .links {
    display: flex;
    gap: 2.2rem;
    margin-bottom: 3rem;
  }

  .links a {
    font-size: clamp(0.8rem, 2.2vw, 0.88rem);
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .links a:hover {
    color: var(--text-mid);
  }

  /* Projects line */
  .projects {
    margin-bottom: 3rem;
  }

  .projects a {
    font-size: clamp(0.72rem, 1.8vw, 0.8rem);
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.3s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .projects a:hover {
    color: var(--text-mid);
  }

  /* Footer */
  .footer {
    position: absolute;
    bottom: 1.6rem;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 0.65rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(244, 237, 222, 0.18);
  }
</style>
</head>
